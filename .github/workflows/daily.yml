name: Daily Digest

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional digest date, YYYY-MM-DD"
        required: false
        type: string
      limit:
        description: "Maximum papers per source"
        required: false
        default: "30"
        type: string

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[llm]"
      - name: Generate digest
        run: |
          DATE_ARG=""
          if [ -n "${{ inputs.date }}" ]; then DATE_ARG="--date ${{ inputs.date }}"; fi
          LIMIT="${{ inputs.limit || '30' }}"
          daily2rxiv fetch $DATE_ARG --output data --limit "$LIMIT"
      - name: Commit digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No digest changes to commit."
          else
            git commit -m "chore: update daily digest"
            git push
          fi
